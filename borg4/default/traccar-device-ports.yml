# GPS tracker protocol ports for Traccar.
#
# Mirrors the official Docker guidance:
#   docker run --publish 5000-5300:5000-5300 --publish 5000-5300:5000-5300/udp
#
# metallb (pool 'dii', 192.168.21.151-199, advertised on juno4a) allocates
# a dedicated LoadBalancer IP; all 5000-5300 ports are exposed on it.
# externalTrafficPolicy: Local preserves device source IP (pod runs on juno4a,
# the metallb advertising node, so there is no extra hop).
# Forward these ports at the network edge to the allocated LB IP for remote trackers.
apiVersion: v1
kind: Service
metadata:
  name: traccar-device-ports
  namespace: default
spec:
  type: LoadBalancer
  externalTrafficPolicy: Local
  selector:
    workload.user.cattle.io/workloadselector: deployment-default-traccar
  ports:
    - name: tcp-5000
      port: 5000
      targetPort: 5000
      protocol: TCP
    - name: udp-5000
      port: 5000
      targetPort: 5000
      protocol: UDP
