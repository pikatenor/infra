---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: traccar-data
  namespace: traccar
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    workload.user.cattle.io/workloadselector: deployment-traccar-traccar
  name: traccar
  namespace: traccar
spec:
  replicas: 1
  selector:
    matchLabels:
      workload.user.cattle.io/workloadselector: deployment-traccar-traccar
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        workload.user.cattle.io/workloadselector: deployment-traccar-traccar
    spec:
      containers:
        - name: traccar
          # renovate: depName=traccar/traccar
          image: traccar/traccar:6.12.2
          imagePullPolicy: Always
          ports:
            - containerPort: 8082
              name: http
              protocol: TCP
          # GPS tracker protocol ports 5000-5300 are exposed by the
          # traccar-device-ports NodePort Service (see device-ports.yml).
          livenessProbe:
            failureThreshold: 3
            initialDelaySeconds: 30
            periodSeconds: 10
            successThreshold: 1
            tcpSocket:
              port: 8082
            timeoutSeconds: 2
          volumeMounts:
            - mountPath: /opt/traccar/data
              name: data
              subPath: data
            - mountPath: /opt/traccar/logs
              name: logs
              subPath: logs
          resources: {}
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: traccar-data
        - name: logs
          emptyDir: {}

---
apiVersion: v1
kind: Service
metadata:
  name: traccar
  namespace: traccar
spec:
  ports:
    - name: http
      port: 80
      targetPort: http
  selector:
    workload.user.cattle.io/workloadselector: deployment-traccar-traccar

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: traccar
  namespace: traccar
spec:
  rules:
    - host: traccar.app.p1kachu.net
      http:
        paths:
          - backend:
              service:
                name: traccar
                port:
                  number: 80
            path: /
            pathType: Prefix
  tls:
    - hosts:
        - traccar.app.p1kachu.net
      secretName: wild-cert
