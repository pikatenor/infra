# .woodpecker.yml — place in your app repo root
#
# App repo layout:
#   .
#   ├── Dockerfile
#   ├── k8s/
#   │   ├── deployment.yml
#   │   ├── service.yml
#   │   └── ingress.yml
#   └── .woodpecker.yml
#
# Prerequisites:
#   1. RBAC (see rbac/ in infra repo) applied to k3s
#   2. Woodpecker secrets registered:
#      - k3s_token  (ServiceAccount token for woodpecker-deploy)
#
# NOTE: plugin-docker-buildx v6 has a bug with insecure registries.
#       Use v5 until https://codeberg.org/woodpecker-plugins/docker-buildx/issues/315 is fixed.

variables:
  - &image registry.registry-proxy.svc.cluster.local:5000/#REPLACE_WITH_IMAGE_NAME#
  - &tag ${CI_COMMIT_SHA:0:8}

when:
  - event: push

steps:
  build-and-push:
    image: woodpeckerci/plugin-docker-buildx:5-insecure
    settings:
      repo: *image
      tags:
        - *tag
        - latest
      registry: registry.registry-proxy.svc.cluster.local:5000
      insecure: true
      buildkit_config: |
        [registry."registry.registry-proxy.svc.cluster.local:5000"]
          http = true
      dockerfile: Dockerfile

  deploy:
    image: bitnami/kubectl:latest
    environment:
      SERVICE_ACCOUNT_TOKEN:
        from_secret: k3s_token
    commands:
      - mkdir -p $HOME/.kube
      - |
        cat > $HOME/.kube/config <<EOF
        apiVersion: v1
        kind: Config
        clusters:
        - cluster:
            server: https://kubernetes.default.svc
            certificate-authority: /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
          name: k3s
        contexts:
        - context:
            cluster: k3s
            namespace: #REPLACE_WITH_NAMESPACE_NAME#
            user: deployer
          name: deploy
        current-context: deploy
        users:
        - name: deployer
          user:
            token: $${SERVICE_ACCOUNT_TOKEN}
        EOF
      - sed -i "s|image:.*#REPLACE_WITH_IMAGE_NAME#.*|image: c.p1kachu.net/#REPLACE_WITH_IMAGE_NAME#:${CI_COMMIT_SHA:0:8}|" k8s/deployment.yml
      - kubectl apply -f k8s/
    when:
      branch: main
